<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Neon Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Tech Dot Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#334155" opacity="0.6" />
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="850" height="250" fill="url(#bg)" rx="12" />
  <!-- Grid Overlay -->
  <rect width="850" height="250" fill="url(#grid)" rx="12" />

  <!-- Terminal Window Top Bar -->
  <rect x="0" y="0" width="850" height="35" fill="#1e293b" rx="12" />
  <rect x="0" y="20" width="850" height="15" fill="#1e293b" />
  
  <!-- Mac-style Terminal Buttons -->
  <circle cx="25" cy="17.5" r="6" fill="#ef4444" />
  <circle cx="45" cy="17.5" r="6" fill="#eab308" />
  <circle cx="65" cy="17.5" r="6" fill="#22c55e" />
  
  <!-- Terminal Path -->
  <text x="425" y="22" fill="#94a3b8" font-family="monospace" font-size="13" text-anchor="middle">
    ankit-gope@nitdgp: ~/systems/production
  </text>

  <!-- Hero Text Glow (Shadow layer) -->
  <text x="427" y="117" fill="#a855f7" font-family="Arial, sans-serif" font-size="44" font-weight="bold" text-anchor="middle" letter-spacing="2" opacity="0.5">
    > sudo execute ankit.sh _
  </text>
  
  <!-- Main Hero Text -->
  <text x="425" y="115" fill="#f8fafc" font-family="Arial, sans-serif" font-size="44" font-weight="bold" text-anchor="middle" letter-spacing="2">
    > sudo execute <tspan fill="url(#textGrad)">ankit.sh</tspan> _
  </text>

  <!-- Subtitle Line -->
  <text x="425" y="165" fill="#94a3b8" font-family="monospace" font-size="18" text-anchor="middle" letter-spacing="1">
    BUILDING BACKENDS, NOT BRIDGES.
  </text>

  <!-- TAG 1: RAG & GenAI -->
  <rect x="150" y="200" width="160" height="30" fill="#0f172a" rx="6" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="230" y="220" fill="#22d3ee" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">
    🧠 GenAI &amp; RAG
  </text>

  <!-- TAG 2: Systems -->
  <rect x="330" y="200" width="200" height="30" fill="#0f172a" rx="6" stroke="#818cf8" stroke-width="1.5"/>
  <text x="430" y="220" fill="#818cf8" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">
    ⚙️ Distributed Systems
  </text>

  <!-- TAG 3: Coding Habit -->
  <rect x="550" y="200" width="150" height="30" fill="#0f172a" rx="6" stroke="#c084fc" stroke-width="1.5"/>
  <text x="625" y="220" fill="#c084fc" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">
    🔥 1 AM Shipper
  </text>
</svg>
